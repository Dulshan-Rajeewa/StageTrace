[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

pythonpath = .

addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

markers =
    unit: Unit tests (isolated, no I/O)
    integration: Integration tests (with mocks, local dependencies)
    e2e: End-to-end tests (full flow)